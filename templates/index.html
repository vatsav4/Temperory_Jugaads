{% extends "base.html" %}
{% block title %}New Loss Log Entry{% endblock %}
{% block content %}
  {% if saved %}
    <p class="success">Entry saved. You can add another below.</p>
  {% endif %}
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  <form method="post" class="loss-form">
    <label for="typename">Station</label>
    <input type="text" id="typename" name="typename" placeholder="e.g. Type 1009" required autofocus>

    <label>Loss Type</label>
    <div class="loss-type-grid">
      {% for id, text in loss_id_choices.items() %}
      <input type="radio" id="loss_id_{{ id }}" name="loss_id" value="{{ id }}" required>
      <label for="loss_id_{{ id }}" class="loss-type-card">{{ text }}</label>
      {% endfor %}
    </div>

    <label for="start_time">Loss Start</label>
    <div class="time-row">
      <input type="datetime-local" id="start_time" name="start_time" step="60" required>
      <button type="button" class="now-btn" data-target="start_time">Now</button>
    </div>

    <label for="end_time">Loss End</label>
    <div class="time-row">
      <input type="datetime-local" id="end_time" name="end_time" step="60" required>
      <button type="button" class="now-btn" data-target="end_time">Now</button>
    </div>

    <p class="hint" id="computed-duration"></p>

    <label for="loss_comments">Reason <span class="optional">(optional)</span></label>
    <input type="text" id="loss_comments" name="loss_comments" placeholder="e.g. Battery shortage">

    <button type="submit" class="save-btn">Save Entry</button>
  </form>

  <script>
    const startInput = document.getElementById('start_time');
    const endInput = document.getElementById('end_time');
    const durationOut = document.getElementById('computed-duration');

    function toLocalInputValue(date) {
      const offsetMs = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - offsetMs).toISOString().slice(0, 16);
    }

    document.querySelectorAll('.now-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.target);
        const now = new Date();
        now.setSeconds(0, 0);
        target.value = toLocalInputValue(now);
        updateDuration();
      });
    });

    function updateDuration() {
      if (!startInput.value || !endInput.value) {
        durationOut.textContent = '';
        return;
      }
      const start = new Date(startInput.value);
      const end = new Date(endInput.value);
      const diffMs = end - start;
      if (isNaN(diffMs)) {
        durationOut.textContent = '';
        return;
      }
      if (diffMs <= 0) {
        durationOut.textContent = 'End time must be after start time.';
        durationOut.classList.add('warning');
        return;
      }
      durationOut.classList.remove('warning');
      const totalSeconds = Math.round(diffMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      durationOut.textContent = `Duration: ${minutes} min ${seconds} sec`;
    }

    startInput.addEventListener('input', updateDuration);
    endInput.addEventListener('input', updateDuration);
  </script>
{% endblock %}
